<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Logo Options</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #faf8f2; padding: 48px; font-family: -apple-system, sans-serif; }
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 48px 64px; max-width: 600px; }
    .option { }
    .label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: #aaa;
      margin-bottom: 10px;
    }

    /* The logo block — same dimensions as real sidebar-logo */
    .logo {
      display: block;
      width: 220px;
      background: #2d2a24;
      padding: 16px 18px;
      text-decoration: none;
      border: 1px solid #1a1815;
      cursor: default;
    }

    /* A: Small caps + generous tracking */
    .a {
      font-family: Georgia, serif;
      font-size: 0.875rem;
      font-variant: small-caps;
      letter-spacing: 0.14em;
      color: #e8e4d8;
      line-height: 1;
    }

    /* B: Two-line stacked — Vancouver dominant, Community secondary */
    .b { font-family: Georgia, serif; line-height: 1; }
    .b-top {
      display: block;
      font-size: 1.05rem;
      color: #e8e4d8;
      letter-spacing: 0.01em;
      margin-bottom: 5px;
    }
    .b-bottom {
      display: block;
      font-size: 0.68rem;
      letter-spacing: 0.1em;
      color: rgba(232,228,216,0.5);
      text-transform: uppercase;
    }

    /* C: Inverted — "VANCOUVER" small above, "Community" large below */
    .c { font-family: Georgia, serif; line-height: 1; }
    .c-top {
      display: block;
      font-size: 0.6rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: rgba(232,228,216,0.45);
      margin-bottom: 5px;
    }
    .c-bottom {
      display: block;
      font-size: 1.2rem;
      color: #e8e4d8;
      letter-spacing: -0.01em;
    }

    /* D: Rule between the two words */
    .d { font-family: Georgia, serif; }
    .d-top {
      display: block;
      font-size: 0.95rem;
      color: #e8e4d8;
      letter-spacing: 0.03em;
      margin-bottom: 9px;
    }
    .d-rule {
      display: block;
      height: 1px;
      background: rgba(232,228,216,0.2);
      margin-bottom: 9px;
    }
    .d-bottom {
      display: block;
      font-size: 0.72rem;
      letter-spacing: 0.09em;
      color: rgba(232,228,216,0.55);
    }
  </style>
</head>
<body>
  <div class="grid">

    <div class="option">
      <div class="label">A — Small caps + tracking</div>
      <div class="logo a">Vancouver Community</div>
    </div>

    <div class="option">
      <div class="label">B — Two-line stacked</div>
      <div class="logo b">
        <span class="b-top">Vancouver</span>
        <span class="b-bottom">Community</span>
      </div>
    </div>

    <div class="option">
      <div class="label">C — Inverted hierarchy</div>
      <div class="logo c">
        <span class="c-top">Vancouver</span>
        <span class="c-bottom">Community</span>
      </div>
    </div>

    <div class="option">
      <div class="label">D — Rule separator</div>
      <div class="logo d">
        <span class="d-top">Vancouver</span>
        <span class="d-rule"></span>
        <span class="d-bottom">Community</span>
      </div>
    </div>

  </div>
</body>
</html>
